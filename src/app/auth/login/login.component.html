<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="assets/images/icon.png" alt="VoltGO" class="auth-logo-img" />
    </div>
    <p class="auth-tag">Admin Portal</p>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to manage riders, orders, and fleet operations.</p>

    <div class="auth-alert auth-alert-info" *ngIf="sessionExpired">
      <i class="ri-time-line"></i>
      <span>Your session expired. Please sign in again.</span>
    </div>

    <div class="auth-alert auth-alert-error" *ngIf="errorMessage()">
      <i class="ri-error-warning-line"></i>
      <span>{{ errorMessage() }}</span>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input id="email" type="email" class="form-input" [class.input-error]="emailInvalid"
          placeholder="admin@voltgo.com" formControlName="email" autocomplete="username" />
        <p class="field-error" *ngIf="emailInvalid">Enter a valid email address.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrap">
          <input id="password" [type]="showPassword() ? 'text' : 'password'" class="form-input"
            [class.input-error]="passwordInvalid" placeholder="Enter your password" formControlName="password"
            autocomplete="current-password" />
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" tabindex="-1">
            <i [ngClass]="showPassword() ? 'ri-eye-off-line' : 'ri-eye-line'"></i>
          </button>
        </div>
        <p class="field-error" *ngIf="passwordInvalid">Password is required.</p>
      </div>

      <button type="submit" class="btn-dark auth-submit" [disabled]="submitting()">
        <i class="ri-loader-4-line spin" *ngIf="submitting()"></i>
        <span>{{ submitting() ? 'Signing in...' : 'Sign In' }}</span>
      </button>
    </form>

    <p class="auth-footnote">
      <i class="ri-shield-keyhole-line"></i>
      Access is restricted to authorized VoltGo administrators.
    </p>
  </div>
</div>
